# Production: set DATABASE_URL to the site's remote Postgres and run:
#   docker compose up -d
# Only connector-api runs; no local Postgres.
# For local testing with a local Postgres, use:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
services:
  connector-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bambu-connector-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8081}
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PORT:-8081}:8081"
